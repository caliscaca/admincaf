<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Kopi Senja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDnaJ1KKoPtDxmXvW6M6smdRu5NPG90PhcY",
            authDomain: "cacef-a14bc.firebaseapp.com",
            projectId: "cacef-a14bc",
            storageBucket: "cacef-a14bc.firebasestorage.app",
            messagingSenderId: "938285152529",
            appId: "1:938285152529:web:c2ffeb050102d09e1c74b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.fbOps = { doc, updateDoc };

        // Real-time Sync
        const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            window.ordersData = snapshot.docs.map(d => ({ firestoreId: d.id, ...d.data() }));
            renderOrders();
            updateStats();
        });
    </script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="flex h-screen">
        <aside class="w-64 bg-stone-900 text-white p-6 hidden md:block">
            <h2 class="text-2xl font-bold text-orange-400 mb-10 italic">KOPI<span class="text-white font-normal">SENJA.</span></h2>
            <nav class="space-y-4">
                <div class="py-2.5 px-4 rounded bg-orange-600 font-bold text-sm"><i class="fas fa-home mr-2"></i> Dashboard</div>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-8">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-black text-stone-800 tracking-tight">Cloud Management</h1>
                    <p class="text-sm text-gray-500">Data sinkron otomatis ke Firebase.</p>
                </div>
                <div class="bg-green-100 text-green-700 px-4 py-1 rounded-full text-xs font-bold animate-pulse">● Sistem Aktif</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-orange-500">
                    <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">Menunggu</p>
                    <h3 id="stat-pending" class="text-3xl font-black">0</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-blue-500">
                    <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">Proses</p>
                    <h3 id="stat-process" class="text-3xl font-black">0</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-green-500">
                    <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">Selesai</p>
                    <h3 id="stat-done" class="text-3xl font-black">0</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-yellow-500">
                    <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">Omzet Cloud</p>
                    <h3 id="stat-revenue" class="text-2xl font-black text-orange-600">Rp 0</h3>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
                <table class="w-full text-left">
                    <thead class="bg-stone-50 border-b border-gray-100">
                        <tr class="text-[11px] font-black text-gray-400 uppercase tracking-wider">
                            <th class="p-5">ID / Meja</th>
                            <th class="p-5">Detail Pesanan</th>
                            <th class="p-5">Total</th>
                            <th class="p-5 text-center">Status</th>
                            <th class="p-5 text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="admin-order-list" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        function renderOrders() {
            const list = document.getElementById('admin-order-list');
            list.innerHTML = window.ordersData.map((order, index) => `
                <tr class="hover:bg-gray-50 transition text-sm">
                    <td class="p-5 font-mono font-bold text-gray-400">#${order.id}<br><span class="text-stone-900 text-xs font-black uppercase">MEJA ${order.table}</span></td>
                    <td class="p-5 font-medium text-gray-600">${order.items.map(i => `${i.name}(${i.qty})`).join(', ')}</td>
                    <td class="p-5 font-black text-stone-900">Rp ${order.total.toLocaleString('id-ID')}</td>
                    <td class="p-5 text-center">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${order.status === 'Pending' ? 'bg-yellow-100 text-yellow-700' : order.status === 'Proses' ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700'}">${order.status}</span>
                    </td>
                    <td class="p-5 text-right flex justify-end gap-2">
                        ${order.status === 'Pending' ? `<button onclick="updateStatus(${index}, 'Proses')" class="bg-stone-900 text-white px-4 py-2 rounded-xl text-[10px] font-bold">PROSES</button>` : ''}
                        ${order.status === 'Proses' ? `<button onclick="updateStatus(${index}, 'Selesai')" class="bg-green-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold">DONE</button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(index, newStatus) {
            const order = window.ordersData[index];
            const { doc, updateDoc } = window.fbOps;
            await updateDoc(doc(window.db, "orders", order.firestoreId), { status: newStatus });
        }

        function updateStats() {
            const d = window.ordersData;
            document.getElementById('stat-pending').innerText = d.filter(o => o.status === 'Pending').length;
            document.getElementById('stat-process').innerText = d.filter(o => o.status === 'Proses').length;
            document.getElementById('stat-done').innerText = d.filter(o => o.status === 'Selesai').length;
            const rev = d.filter(o => o.status === 'Selesai').reduce((a, b) => a + b.total, 0);
            document.getElementById('stat-revenue').innerText = `Rp ${rev.toLocaleString('id-ID')}`;
        }
    </script>
</body>
</html>
